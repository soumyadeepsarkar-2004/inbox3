name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Install dependencies
      working-directory: frontend
      run: pnpm install
    
    - name: Lint
      working-directory: frontend
      run: pnpm lint
    
    - name: Build
      working-directory: frontend
      run: pnpm build
    
    - name: Run tests
      working-directory: frontend
      run: pnpm test

  landing:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: landing/package-lock.json

    - name: Install dependencies
      working-directory: landing
      run: npm ci

    - name: Lint
      working-directory: landing
      run: npm run lint

    - name: Build
      working-directory: landing
      run: npm run build

  signaling-server:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: signaling-server/package-lock.json
    
    - name: Install dependencies
      working-directory: signaling-server
      run: npm install
    
    - name: Verify server
      working-directory: signaling-server
      run: npm list
