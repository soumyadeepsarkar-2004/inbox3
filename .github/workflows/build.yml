name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test

  landing:
    name: landing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build

  signaling-server:
    name: signaling-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: signaling-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: signaling-server/package-lock.json

      - run: npm ci

      - run: npm list

  vercel-build:
    name: vercel-build
    runs-on: ubuntu-latest
    needs: [frontend, landing]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify unified Vercel build script
        run: bash build.sh

      - name: Assert deployment artifacts exist
        run: |
          test -f public/index.html
          test -f public/app/index.html

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [frontend, landing, signaling-server, vercel-build]
    if: always()

    steps:
      - name: Require all jobs to succeed
        run: |
          echo "frontend: ${{ needs.frontend.result }}"
          echo "landing: ${{ needs.landing.result }}"
          echo "signaling-server: ${{ needs.signaling-server.result }}"
          echo "vercel-build: ${{ needs.vercel-build.result }}"
          test "${{ needs.frontend.result }}" = "success"
          test "${{ needs.landing.result }}" = "success"
          test "${{ needs.signaling-server.result }}" = "success"
          test "${{ needs.vercel-build.result }}" = "success"
